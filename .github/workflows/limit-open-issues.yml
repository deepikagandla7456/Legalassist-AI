name: Limit Open Issues per Contributor

on:
  issues:
    types: [opened, reopened]

jobs:
  limit-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Check user's open issues
        uses: actions/github-script@v7
        with:
          script: |
            const creator = context.payload.issue.user.login;
            const association = context.payload.issue.author_association;
            const MAX_OPEN_ISSUES = 5;

            // Define roles that are exempt from the limit
            const EXEMPT_ASSOCIATIONS = ['OWNER', 'MEMBER', 'COLLABORATOR'];

            if (EXEMPT_ASSOCIATIONS.includes(association)) {
              console.log(`User ${creator} has association ${association}. Exempt from issue limits.`);
              return;
            }

            console.log(`Checking open issues count for contributor: ${creator}`);

            // Fetch open issues created by this user in the repository
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: creator,
              state: 'open'
            });

            // Filter out pull requests (GitHub API lists PRs as issues)
            const openIssuesCount = issues.filter(issue => !issue.pull_request).length;

            console.log(`Contributor ${creator} currently has ${openIssuesCount} open issue(s).`);

            if (openIssuesCount > MAX_OPEN_ISSUES) {
              const commentBody = `Hi @${creator},

Thank you for your interest in contributing to this project! 

To ensure we can effectively manage and address all reports, contributors are limited to a maximum of **${MAX_OPEN_ISSUES} open issues** at any given time.

Currently, you have **${openIssuesCount} open issues**. Please resolve, consolidate, or close some of your existing open issues before opening new ones.

This issue will now be closed automatically. Thank you for your cooperation!`;

              // Add a comment to the newly created issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });

              // Close the issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                state: 'closed',
                state_reason: 'not_planned'
              });

              console.log(`Successfully closed issue #${context.issue.number} and left a comment.`);
            }
