name: CI Quality Gates

on:
  push:
    branches: [ main, develop, master ]
  pull_request:
    branches: [ main, develop, master ]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    
    - name: Install linting tools
      run: |
        pip install black flake8 isort
    
    - name: Check Black formatting
      run: |
        black --check core/ api/ pages/ tests/ notification_service.py scheduler.py cli.py 2>&1 || true
    
    - name: Check import order with isort
      run: |
        isort --check-only --diff core/ api/ pages/ tests/ 2>&1 || true
    
    - name: Run flake8 linting
      run: |
        flake8 core/ api/ pages/ tests/ \
          --count \
          --select=E9,F63,F7,F82 \
          --show-source \
          --statistics
    
    - name: Type checking with mypy
      run: |
        pip install mypy
        mypy core/ api/ --ignore-missing-imports || true

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    
    - name: Install security tools
      run: |
        pip install bandit safety pip-audit
    
    - name: Run Bandit security scan
      run: |
        bandit -r core/ api/ notification_service.py scheduler.py -f json -o bandit-report.json || true
    
    - name: Check dependencies with Safety
      run: |
        safety check --json || true
    
    - name: Upload Bandit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: bandit-report
        path: bandit-report.json

  docker-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/${{ github.repository }}
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  validate-openapi:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    
    - name: Validate OpenAPI spec
      run: |
        pip install openapi-spec-validator
        python -c "from api.main import app; print('OpenAPI spec valid')" 2>&1 || echo "Skipping OpenAPI validation"