name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install pip-tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-tools

      - name: Generate locked requirements
        id: lock
        run: |
          # Generate a deterministic requirements.lock.txt from requirements.txt
          if [ -f requirements.txt ]; then
            pip-compile --resolver=backtracking --output-file=requirements.lock.txt requirements.txt || true
          fi

      - name: Check lockfile unchanged
        run: |
          if [ -f requirements.lock.txt ]; then
            git add requirements.lock.txt || true
            if ! git diff --exit-code --quiet -- requirements.lock.txt; then
              echo "requirements.lock.txt is out of date. Please run 'pip-compile requirements.txt' locally and commit the changes." >&2
              git --no-pager diff -- requirements.lock.txt || true
              exit 1
            fi
          else
            echo "No requirements.lock.txt present; CI generated one but it is not committed. Please commit requirements.lock.txt to enable deterministic installs." >&2
            exit 1
          fi

      - name: Install dependencies
        run: |
          if [ -f requirements.lock.txt ]; then
            pip install --upgrade pip
            pip install -r requirements.lock.txt
          else
            pip install --upgrade pip
            pip install -r requirements.txt
          fi

      - name: Type check (mypy)
        run: |
          python -m pip install mypy
          mypy . || true

      - name: Run tests (unit)
        env:
          PYTHONPATH: .
        run: |
          python -m pip install pytest
          pytest -q -k "not contract"

  contract-tests:
    runs-on: ubuntu-latest
    needs: build
    if: contains(github.event.pull_request.head.repo.full_name, github.repository) && env.RUN_LLM_CONTRACTS == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run LLM contract tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_BASE_URL: ${{ secrets.OPENROUTER_BASE_URL }}
        run: |
          python -m pip install pytest
          pytest -q -k contract
